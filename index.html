<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Text Summariser</title>
    <style>
        body{
            background-color: #95C5D6 ;
            font-family: 'Times New Roman', Times, serif;
            margin:0;
            padding:0;
            color : #333;
        }

        .container{
            max-width: 800px;
            margin: 50px auto;
            padding: 10px;
            background-color: #fff;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            text-align: center;
        }
        h1{
            color: #007299;
            text-align: center;
        }
        h3{
            color: #007299;
            margin-top: -20px;
            margin-bottom: 40px;
        }
        form{
            display:flex;
            flex-direction: column;
            gap: 20px; 
        }
        textarea {
        width: 100%;
        border: 2px solid #ccc;
        border-radius: 6px;
        font-size: 16px;
        padding: 12px;
        box-sizing: border-box;  /* prevents textarea from overflowing the container */
        font-family: 'Times New Roman', Times, serif;
        line-height: 1.8;
        word-spacing: 3px;
    }
        button{
            padding: 10px 20px;
            background-color: #007299;
            color: #fff;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            cursor: pointer;
        }
        button.hover{
            background-color: #007299;
        }
        #summary_output{
            margin-top: 30px;
            margin-bottom: 50px;
            padding: 50px;
            background-color: #95C5D6 ;
            border-radius: 10px;
        } 
        #summary_heading{
            margin: 10px;
            padding: 10px;
            border-radius: 8px;
            
        }
        .summary-heading{
            background-color: #95C5D6 ;
            
        }
        #summary_text {
        font-size: 15px;
        line-height: 1.6;
        color: #333;
        margin: 0;
        border: 1px solid #5f5e5e;
        margin-top: 10px;
        border-radius: 8px;
        text-align: left;
        min-height: 100px;
        max-height: 200px;
        overflow-y: auto;
        padding: 12px;  /* add this */
        line-height: 1.8;
        word-spacing: 3px;
        }


    </style>


</head>
<body>
    <div class = 'container'>
        <h1>Text Summariser</h1>    
        <h3>Using Hugging Face Transformer</h3>
        <p>Enter text to summarise and click the "Summarise" button to get a concise summary of the content.</p>

        <form id = 'summarisation-form' method = 'POST' action = '/summarise'>
            <textarea id = 'dialogue_input', name="input_text" rows="10" cols="50" placeholder="Enter text to summarise..." required></textarea><br>
            <button type = 'submit'>Summarise</button>
        </form>

        <div class = 'summary-output'>
            <h3 class = 'summary-heading' id = 'summary_heading'>Content Summary</h3>
            <p id = 'summary_text'></p>
        </div>

    </div>

<script>
    document.getElementById('summarisation-form').addEventListener('submit', async (event) => {
        event.preventDefault(); // Prevent the default form submission

        const dialogueInput = document.getElementById('dialogue_input');
        const summaryText = document.getElementById('summary_text');
        const submitbutton = event.target.querySelector('button[type="submit"]');

        const dialogue = dialogueInput.value.trim();
        if (!dialogue) {
            return;
        }

        summaryText.textContent = 'Summarising...';
        submitbutton.disabled = true;

        try{
            const response = await fetch('/summarise/', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ dialogue})
            });

            if (!response.ok) {
                throw new Error(`Server Error: ${response.status}`);
            
        }   

        const data = await response.json();
        summaryText.innerText = data.summary || 'No summary available.';
    }
        catch (error) {
            console.error('Error:', error);
            summaryText.innerText = 'An error occurred. Please try again.';
        } finally {
            submitbutton.disabled = false;
        }

    });

</script>

</body>
</html>
